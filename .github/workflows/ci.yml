name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - run: cargo test --locked --all-targets

  lambda-build:
    runs-on: ubuntu-latest
    needs: rust
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-lambda --locked
      - run: ./scripts/build-lambda.sh

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: sudo apt-get update
      - run: sudo apt-get install -y shellcheck
      - run: shellcheck scripts/*.sh
      - name: Test favorite category helper
        run: |
          tmp="$(mktemp)"
          TFVARS_FILE="$tmp" ./scripts/favorite-category.sh list | grep -F "No favorite categories configured."
          TFVARS_FILE="$tmp" ./scripts/favorite-category.sh add en Physics
          TFVARS_FILE="$tmp" ./scripts/favorite-category.sh add en Category:Mathematics
          TFVARS_FILE="$tmp" ./scripts/favorite-category.sh remove en Physics
          TFVARS_FILE="$tmp" ./scripts/favorite-category.sh list | grep -Fx "en:Category:Mathematics"
          grep -Fx 'favorite_categories = "en:Category:Mathematics"' "$tmp"

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.6.6
      - run: terraform -chdir=infra fmt -check -recursive
      - run: terraform -chdir=infra init -backend=false
      - run: terraform -chdir=infra validate -no-color
